<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulthread - Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="notif" class="notif"></div>

<div class="screen active fade-in">
  <nav>
    <a href="dashboard.html" class="logo" style="text-decoration:none">soul<span>thread</span></a>
    <div style="display:flex;align-items:center;gap:16px">
      <a href="dashboard.html" class="btn btn-ghost btn-sm" style="text-decoration:none">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="scroll-body">
    <div class="page-center">
      <div class="form-wrap" style="max-width: 600px; padding: 2.5rem; background: var(--white); border: 1px solid var(--cream-2); border-radius: var(--r2); box-shadow: var(--shadow);">
        
        <div style="margin-bottom: 2rem; border-bottom: 1px solid var(--cream-2); padding-bottom: 1.5rem;">
          <h1 class="form-title" style="font-size: 2.2rem; color: var(--ink);">Edit Your Profile</h1>
          <p class="form-sub" style="margin-bottom: 0;">Update your anonymous identity and algorithm preferences.</p>
        </div>

        <form id="edit-profile-form" style="display: none;">
          <div class="field-row">
            <div class="field"><label>Anonymous Username</label><input id="p-username" type="text" required></div>
            <div class="field"><label>Phone Number</label><input id="p-phone" type="text" required></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Age</label><input id="p-age" type="number" required></div>
            <div class="field"><label>Location</label><input id="p-location" type="text" required></div>
          </div>
          <div class="field"><label>I identify as</label>
            <select id="p-gender">
              <option value="A woman">A woman</option>
              <option value="A man">A man</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>
          <div class="field"><label>Bio</label><textarea id="p-bio" required style="min-height:100px"></textarea></div>
          <div class="field"><label>I'm interested in</label>
            <select id="p-seeking">
              <option value="Women">Women</option>
              <option value="Men">Men</option>
              <option value="Any gender">Any gender</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1rem;" id="p-save-btn">Save Changes</button>
        </form>

        <div id="profile-loading" style="text-align: center; padding: 3rem 0; color: var(--ink-3);">
           Fetching your secure data... ✨
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
