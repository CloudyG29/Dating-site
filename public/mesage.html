<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0a0a0b;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      #app {
        display: flex;
        flex-direction: column;
        width: 420px;
        height: 620px;
        background: #0f0f10;
        border-radius: 16px;
        overflow: hidden;
        border: 0.5px solid #2a2a2e;
      }

      #chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: #161618;
        border-bottom: 0.5px solid #2a2a2e;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #3b2d6e;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 500;
        color: #b8a4f0;
        flex-shrink: 0;
      }

      .header-info {
        flex: 1;
      }
      .header-name {
        font-size: 15px;
        font-weight: 500;
        color: #e8e8ec;
      }
      .header-status {
        font-size: 12px;
        color: #6b6b7a;
        margin-top: 2px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #2ecc71;
        display: inline-block;
        margin-right: 5px;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #0f0f10;
      }

      #messages::-webkit-scrollbar {
        width: 4px;
      }
      #messages::-webkit-scrollbar-track {
        background: transparent;
      }
      #messages::-webkit-scrollbar-thumb {
        background: #2a2a2e;
        border-radius: 2px;
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 68%;
        animation: fadeUp 0.2s ease;
      }
      .msg.mine {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg.theirs {
        align-self: flex-start;
        align-items: flex-start;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .bubble {
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
      }
      .msg.mine .bubble {
        background: #5b3fc4;
        color: #f0ecff;
        border-bottom-right-radius: 4px;
      }
      .msg.theirs .bubble {
        background: #1e1e22;
        color: #d8d8e0;
        border-bottom-left-radius: 4px;
        border: 0.5px solid #2a2a2e;
      }

      .msg-time {
        font-size: 11px;
        color: #4a4a58;
        margin-top: 4px;
        padding: 0 4px;
      }

      .date-divider {
        text-align: center;
        font-size: 11px;
        color: #3a3a48;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }
      .date-divider::before,
      .date-divider::after {
        content: "";
        flex: 1;
        height: 0.5px;
        background: #2a2a2e;
      }

      #poll-status {
        text-align: center;
        font-size: 11px;
        color: #3a3a48;
        padding: 5px 0;
        background: #0f0f10;
      }

      #input-area {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: #161618;
        border-top: 0.5px solid #2a2a2e;
      }

      #msg-input {
        flex: 1;
        background: #1e1e22;
        border: 0.5px solid #2a2a2e;
        border-radius: 22px;
        padding: 10px 16px;
        font-size: 14px;
        color: #e8e8ec;
        outline: none;
        font-family: inherit;
        transition: border-color 0.15s;
      }
      #msg-input::placeholder {
        color: #4a4a58;
      }
      #msg-input:focus {
        border-color: #5b3fc4;
      }

      #send-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #5b3fc4;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      #send-btn:hover {
        background: #6d4fd4;
      }
      #send-btn:active {
        transform: scale(0.94);
      }
      #send-btn i {
        font-size: 17px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="chat-header">
        <div class="avatar">SK</div>
        <div class="header-info">
          <div class="header-name">Sarah K.</div>
          <div class="header-status">
            <span class="status-dot"></span>Online now
          </div>
        </div>
        <i
          class="ti ti-dots-vertical"
          style="font-size: 20px; color: #4a4a58; cursor: pointer"
        ></i>
      </div>

      <div id="messages">
        <div class="date-divider">Today</div>
      </div>

      <div id="poll-status">Polling every 3s...</div>

      <div id="input-area">
        <input
          type="text"
          id="msg-input"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="send-btn" aria-label="Send message">
          <i class="ti ti-send"></i>
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        getIdToken,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBV4ztQm7sxiEFyAFsvCWLclitY-6cq4T8",
        authDomain: "linkup-7880e.firebaseapp.com",
        projectId: "linkup-7880e",
        storageBucket: "linkup-7880e.firebasestorage.app",
        messagingSenderId: "1029218787471",
        appId: "1:1029218787471:web:12b1ecd53626beb7f6d0fa",
        measurementId: "G-VW5F5YZGND",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const messagesEl = document.getElementById("messages");
      const input = document.getElementById("msg-input");
      const pollStatus = document.getElementById("poll-status");

      const matchId = new URLSearchParams(window.location.search).get('matchId');
      const messageIds = new Set();
      let currentUid = null;
      let authToken = null;

      function formatTime() {
        return new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function renderMessage(msg) {
        if (messageIds.has(msg.id)) return;
        messageIds.add(msg.id);

        const isMine = msg.senderUid === currentUid;
        const div = document.createElement("div");
        div.className = `msg ${isMine ? "mine" : "theirs"}`;
        div.innerHTML = `
      <div class="bubble">${msg.content}</div>
      <div class="msg-time">${msg.sentAt}</div>
    `;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function getAuthHeaders() {
        return authToken ? { Authorization: `Bearer ${authToken}` } : {};
      }

      async function sendMessage() {
        const content = input.value.trim();
        if (!content || !matchId || !currentUid) return;
        input.value = "";

        renderMessage({
          id: `local-${Date.now()}`,
          senderUid: currentUid,
          content,
          sentAt: formatTime(),
        });

        try {
          await fetch('/api/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...getAuthHeaders(),
            },
            body: JSON.stringify({ matchId, content }),
          });
        } catch (err) {
          console.error('Message send failed:', err);
        }
      }

      async function poll() {
        if (!matchId || !currentUid) {
          pollStatus.textContent = 'Waiting for chat authentication...';
          return;
        }

        try {
          const res = await fetch(`/api/messages/${matchId}`, {
            headers: getAuthHeaders(),
          });
          if (!res.ok) {
            const error = await res.json();
            pollStatus.textContent = error.error || 'Unable to load messages';
            return;
          }
          const messages = await res.json();
          messages.forEach(renderMessage);
          pollStatus.textContent = `Last synced at ${formatTime()} · polling every 3s`;
        } catch (err) {
          console.error('Message poll failed:', err);
          pollStatus.textContent = 'Unable to sync messages';
        }
      }

      document
        .getElementById("send-btn")
        .addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = 'login.html';
          return;
        }

        currentUid = user.uid;
        authToken = await getIdToken(user);
        await poll();
      });

      setInterval(poll, 3000);
    </script>
  </body>
</html>
