<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0a0a0b;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      #app {
        display: flex;
        flex-direction: column;
        width: 420px;
        height: 620px;
        background: #0f0f10;
        border-radius: 16px;
        overflow: hidden;
        border: 0.5px solid #2a2a2e;
      }

      #chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: #161618;
        border-bottom: 0.5px solid #2a2a2e;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #3b2d6e;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 500;
        color: #b8a4f0;
        flex-shrink: 0;
      }

      .header-info {
        flex: 1;
      }
      .header-name {
        font-size: 15px;
        font-weight: 500;
        color: #e8e8ec;
      }
      .header-status {
        font-size: 12px;
        color: #6b6b7a;
        margin-top: 2px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #2ecc71;
        display: inline-block;
        margin-right: 5px;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #0f0f10;
      }

      #messages::-webkit-scrollbar {
        width: 4px;
      }
      #messages::-webkit-scrollbar-track {
        background: transparent;
      }
      #messages::-webkit-scrollbar-thumb {
        background: #2a2a2e;
        border-radius: 2px;
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 68%;
        animation: fadeUp 0.2s ease;
      }
      .msg.mine {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg.theirs {
        align-self: flex-start;
        align-items: flex-start;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .bubble {
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
      }
      .msg.mine .bubble {
        background: #5b3fc4;
        color: #f0ecff;
        border-bottom-right-radius: 4px;
      }
      .msg.theirs .bubble {
        background: #1e1e22;
        color: #d8d8e0;
        border-bottom-left-radius: 4px;
        border: 0.5px solid #2a2a2e;
      }

      .msg-time {
        font-size: 11px;
        color: #4a4a58;
        margin-top: 4px;
        padding: 0 4px;
      }

      .date-divider {
        text-align: center;
        font-size: 11px;
        color: #3a3a48;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }
      .date-divider::before,
      .date-divider::after {
        content: "";
        flex: 1;
        height: 0.5px;
        background: #2a2a2e;
      }

      #poll-status {
        text-align: center;
        font-size: 11px;
        color: #3a3a48;
        padding: 5px 0;
        background: #0f0f10;
      }

      #input-area {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: #161618;
        border-top: 0.5px solid #2a2a2e;
      }

      #msg-input {
        flex: 1;
        background: #1e1e22;
        border: 0.5px solid #2a2a2e;
        border-radius: 22px;
        padding: 10px 16px;
        font-size: 14px;
        color: #e8e8ec;
        outline: none;
        font-family: inherit;
        transition: border-color 0.15s;
      }
      #msg-input::placeholder {
        color: #4a4a58;
      }
      #msg-input:focus {
        border-color: #5b3fc4;
      }

      #send-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #5b3fc4;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      #send-btn:hover {
        background: #6d4fd4;
      }
      #send-btn:active {
        transform: scale(0.94);
      }
      #send-btn i {
        font-size: 17px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="chat-header">
        <div class="avatar">SK</div>
        <div class="header-info">
          <div class="header-name">Sarah K.</div>
          <div class="header-status">
            <span class="status-dot"></span>Online now
          </div>
        </div>
        <i
          class="ti ti-dots-vertical"
          style="font-size: 20px; color: #4a4a58; cursor: pointer"
        ></i>
      </div>

      <div id="messages">
        <div class="date-divider">Today</div>
      </div>

      <div id="poll-status">Polling every 3s...</div>

      <div id="input-area">
        <input
          type="text"
          id="msg-input"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="send-btn" aria-label="Send message">
          <i class="ti ti-send"></i>
        </button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const input = document.getElementById("msg-input");
      const pollStatus = document.getElementById("poll-status");

      const CURRENT_USER_ID = 1; // replace with logged-in user's ID
      const MATCH_ID = 5; // replace with actual match ID

      const messageIds = new Set();

      function formatTime() {
        return new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function renderMessage(msg) {
        if (messageIds.has(msg.id)) return;
        messageIds.add(msg.id);

        const isMine = msg.senderId === CURRENT_USER_ID;
        const div = document.createElement("div");
        div.className = `msg ${isMine ? "mine" : "theirs"}`;
        div.innerHTML = `
      <div class="bubble">${msg.content}</div>
      <div class="msg-time">${msg.sentAt}</div>
    `;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage() {
        const content = input.value.trim();
        if (!content) return;
        input.value = "";

        // Optimistic render — shows instantly without waiting for server
        renderMessage({
          id: `local-${Date.now()}`,
          senderId: CURRENT_USER_ID,
          content,
          sentAt: formatTime(),
        });

        // TODO: uncomment when backend is ready
        // await fetch('/messages', {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify({ matchId: MATCH_ID, senderId: CURRENT_USER_ID, content })
        // });
      }

      document
        .getElementById("send-btn")
        .addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      async function poll() {
        // TODO: uncomment when backend is ready
        // const res = await fetch(`/messages/${MATCH_ID}`);
        // const messages = await res.json();
        // messages.forEach(renderMessage);

        pollStatus.textContent = `Last synced at ${formatTime()} · polling every 3s`;
      }

      setInterval(poll, 3000);

      // TODO: uncomment when backend is ready to load existing messages on open
      // poll();

      // Demo messages — delete these when backend is wired up
      [
        {
          id: 1,
          senderId: 2,
          content: "Hey! Saw we matched 👀",
          sentAt: "10:42 AM",
        },
        {
          id: 2,
          senderId: 1,
          content: "Yeah haha, your bio had me at 'hates small talk'",
          sentAt: "10:44 AM",
        },
        {
          id: 3,
          senderId: 2,
          content: "Finally someone who gets it 😂 So what do you actually do?",
          sentAt: "10:45 AM",
        },
      ].forEach(renderMessage);
    </script>
  </body>
</html>
