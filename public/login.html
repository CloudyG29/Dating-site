<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulthread - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Exact input styling matching your original design */
        .st-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid var(--cream-3, #e4ddd1);
            border-radius: var(--r, 12px);
            font-family: var(--sans, 'DM Sans', sans-serif);
            font-size: 1rem;
            color: var(--ink, #1e1a17);
            background: var(--white, #ffffff);
            outline: none;
            transition: all 0.2s ease;
        }
        .st-input:focus {
            border-color: var(--gold, #b8956a);
            box-shadow: 0 0 0 3px var(--gold-light, #f5edd8);
        }
        .st-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--ink-2, #4a433c);
        }
        .st-form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
    </style>
</head>
<body>
<div id="notif" class="notif"></div>

<div class="screen active fade-in">
  <nav>
    <a href="index.html" class="logo" style="text-decoration:none">soul<span>thread</span></a>
    <a href="register.html" class="btn btn-ghost btn-sm" style="text-decoration:none">Create Account</a>
  </nav>

  <div class="scroll-body">
    <div class="page-center">
      <div class="form-wrap" style="max-width: 400px; padding: 3rem 2rem; background: var(--white); border: 1px solid var(--cream-2); border-radius: var(--r2, 20px); box-shadow: var(--shadow, 0 4px 24px rgba(30,26,23,0.04));">
        <div style="text-align: center; margin-bottom: 2.5rem;">
          <h1 class="form-title" style="font-family: var(--serif); font-size: 2.5rem; color: var(--ink); margin-bottom: 0.5rem;">Welcome Back</h1>
          <p class="form-sub" style="color: var(--ink-3); font-size: 0.95rem;">Sign in to your private dashboard.</p>
        </div>

        <form id="login-form">
          <div class="st-form-group">
            <label class="st-label">Email Address</label>
            <input type="email" id="login-email" class="st-input" required placeholder="you@example.com">
          </div>
          <div class="st-form-group">
            <label class="st-label">Password</label>
            <input type="password" id="login-password" class="st-input" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.9rem; font-size: 1rem;">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.85rem; color: var(--ink-3);">
          Don't have an account? <a href="register.html" style="color: var(--gold-dark); text-decoration: none; font-weight: 500;">Begin here</a>.
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
